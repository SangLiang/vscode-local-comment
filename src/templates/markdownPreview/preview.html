<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src ${cspSource} 'unsafe-inline'; script-src ${cspSource} 'unsafe-inline'; img-src ${cspSource} https: http: data: svg: blob:; connect-src 'none'; font-src 'none'; object-src 'none'; media-src 'none'; frame-src 'none';">
    <title>Markdown 预览</title>
    <link rel="stylesheet" href="${cssUri}">
    <link rel="stylesheet" href="${katexCssUri}">
    <link rel="stylesheet" href="${highlightCssUri}">
</head>
<body>
    <div class="container">
        <div class="header">
        <div class="title-row">
            <div class="title">${fileName}</div>
        </div>
            <div class="help-text">
                Alt+单击跳转源码 · Ctrl+滚轮缩放图表 · Ctrl+F 搜索
            </div>
        </div>

        <div class="content-area">
            <div id="previewFindBar" class="preview-find-bar" hidden>
                <input id="previewFindInput" class="preview-find-input" type="search" placeholder="在预览中搜索..." autocomplete="off" spellcheck="false" />
                <span id="previewFindStatus" class="preview-find-status"></span>
                <button type="button" id="previewFindPrev" class="preview-find-btn" title="上一个 (Shift+Enter)">↑</button>
                <button type="button" id="previewFindNext" class="preview-find-btn" title="下一个 (Enter)">↓</button>
                <button type="button" id="previewFindClose" class="preview-find-btn preview-find-close" title="关闭 (Esc)">×</button>
            </div>
            <div id="previewArea" class="preview-area"></div>
        </div>

        <div id="previewActionMenu" class="preview-action-menu">
            <button type="button" id="previewActionMenuToggle" class="preview-action-menu-toggle" aria-expanded="false" aria-controls="previewActionMenuPanel" title="操作菜单">
                <span class="preview-action-menu-icon" aria-hidden="true"></span>
            </button>
            <div id="previewActionMenuPanel" class="preview-action-menu-panel" hidden>
                <div class="export-actions">
                    <label class="export-option" title="仅影响打印时的背景色，不影响屏幕浏览；关闭可节约墨水">
                        <input type="checkbox" id="keepPrintBg">
                        <span>保留打印背景</span>
                    </label>
                    <label class="export-option" title="在预览右侧显示浮动文章目录">
                        <input type="checkbox" id="showTocToggle">
                        <span>显示目录</span>
                    </label>
                    <button class="export-btn" id="exportHtmlBtn" title="导出为 HTML">
                        导出 HTML
                    </button>
                </div>
            </div>
        </div>

        <nav id="previewToc" class="preview-toc" hidden aria-label="文章目录">
            <div class="preview-toc-header" id="previewTocHeader" title="拖拽移动目录">
                <span class="preview-toc-title">目录</span>
                <button type="button" id="previewTocClose" class="preview-toc-close" title="关闭目录">×</button>
            </div>
            <div id="previewTocList" class="preview-toc-list"></div>
        </nav>
    </div>

    <script src="${markedJsUri}" onerror="console.error('marked.js 加载失败')"></script>
    <script src="${highlightJsUri}" onerror="console.error('highlight.js 加载失败')"></script>
    <script src="${mermaidJsUri}" onerror="console.error('mermaid.js 加载失败')"></script>
    <script src="${katexJsUri}" onerror="console.error('katex.js 加载失败')"></script>
    ${publicJsScript}

    <div id="markdownContent" style="display: none;">${escapedContent}</div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const contentElement = document.getElementById('markdownContent');
            if (contentElement) {
                window.markdownContent = contentElement.textContent;
            } else {
                console.error('找不到markdownContent元素');
                window.markdownContent = '';
            }
        });
    </script>
    <script src="${jsUri}"></script>
</body>
</html>
