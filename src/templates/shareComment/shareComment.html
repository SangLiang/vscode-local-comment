<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src ${cspSource} 'unsafe-inline'; script-src ${cspSource} 'unsafe-inline'; img-src ${cspSource} https: http: data: svg: blob:; connect-src 'none'; font-src 'none'; object-src 'none'; media-src 'none'; frame-src 'none';">
    <title>注释预览</title>
    <link rel="stylesheet" href="${cssUri}">
</head>
<body>
    <div class="container">
        ${contextHtml}
        
        <div class="header">
            <div class="title">注释内容预览</div>
            <div class="help-text">
                支持Markdown语法和Mermaid图表，支持缩放功能
            </div>
        </div>
        
        <div class="content-area">
            <div class="preview-controls">
                <button id="toggle-preview-size-btn" class="control-btn" title="最大化/最小化预览">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="16" height="16">
                        <path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 2h-2v3h-3v2h5v-5zm-2-4h2V5h-5v2h3v3z"/>
                    </svg>
                </button>
            </div>
            <div id="previewArea" class="preview-area"></div>
        </div>
        
        <div class="button-group">
            <button class="close-btn" onclick="closePreview()">关闭</button>
        </div>
    </div>

    <script src="${markedJsUri}" onerror="console.error('marked.js 加载失败')"></script>
    <script src="${mermaidJsUri}" onerror="console.error('mermaid.js 加载失败')"></script>
    
    <!-- 隐藏的markdown内容容器，用于安全地传递内容 -->
    <div id="markdownContent" style="display: none;">${escapedContent}</div>
    
    <script>
        // 等待DOM加载完成后再获取内容
        document.addEventListener('DOMContentLoaded', function() {
            const contentElement = document.getElementById('markdownContent');
            if (contentElement) {
                window.markdownContent = contentElement.textContent;
            } else {
                console.error('找不到markdownContent元素');
                window.markdownContent = '';
            }
        });
    </script>
    <script src="${jsUri}"></script>
</body>
</html>
