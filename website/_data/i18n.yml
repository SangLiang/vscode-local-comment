    feature_markdown_desc: "预览 .md 文件，用 @标签 关联代码，一键导出 HTML。"
    feature_data: "数据隔离"
    feature_data_desc: "项目级存储，支持多组注释配置自由切换。"
    feature_graph: "标签关系图"
    feature_graph_desc: "可视化标签引用网络，像 Obsidian 一样组织知识。"
    feature_shortcut: "快捷键驱动"
    feature_shortcut_desc: "全键盘操作，不离开编辑器即可管理注释。"
    demo_tag: "标签跳转"
    demo_tag_desc: "使用 <code>${tagName}</code> 声明标签，<code>@tagName</code> 引用跳转，支持中文标签名。"
