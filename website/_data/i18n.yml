    step2_desc: "按 <kbd>Ctrl+Shift+M</kbd> 打开 Markdown 注释编辑器"
    step3_title: "查看列表"
    step3_desc: "打开侧边栏「Local Comments」视图"
    feature_local: "本地注释"
    feature_local_desc: "不污染源码的持久笔记，独立于 Git 分支。"
    feature_bookmark: "书签导航"
    feature_bookmark_desc: "跨文件标记阅读路径，快速定位关键代码。"
