home:
  zh:
    badge: "VS Code: Extension · 本地代码注释与知识管理工具"
    title: "让代码注释<br><span class=\"hero-gradient-text\">留在编辑器里</span>"
    subtitle: "不修改源代码，为代码附加持久注释、标签和书签。用 Markdown 写文档，<code>@标签</code> 关联代码，一键生成关系图谱。<br>Mermaid 图表、LaTeX 公式、代码高亮、HTML 导出一站支持。"
    install: "安装扩展 →"
    view_docs: "查看文档"
