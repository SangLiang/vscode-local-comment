    feature_markdown_desc: "Preview .md files, link to code with @tags, one-click HTML export."
    feature_data: "Data Isolation"
    feature_data_desc: "Project-level storage with freely switchable multiple comment groups."
    feature_graph: "Tag Relation Graph"
    feature_graph_desc: "Visualize tag reference networks, organize knowledge like Obsidian."
    feature_shortcut: "Keyboard-Driven"
    feature_shortcut_desc: "Full keyboard operation, manage comments without leaving the editor."
    demo_tag: "Tag Navigation"
    demo_tag_desc: "Declare tags with <code>${tagName}</code>, reference and jump with <code>@tagName</code>, Chinese tags supported."
    demo_markdown: "Markdown Comments"
    demo_markdown_desc: "Multi-line rich text editing with Mermaid diagrams, LaTeX formulas and code highlighting."
    demo_bookmark: "Bookmark Navigation"
    demo_bookmark_desc: "Mark reading paths across files, manage comments and bookmarks via sidebar."

