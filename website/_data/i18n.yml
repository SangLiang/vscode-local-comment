    demo_markdown_desc: "多行富文本编辑，支持 Mermaid 图表、LaTeX 公式和代码高亮。"
    demo_bookmark: "书签导航"
    demo_bookmark_desc: "跨文件标记阅读路径，通过侧边栏统一管理注释和书签。"
  en:
    badge: "VS Code: Extension · Local Code Commenting & Knowledge Management"
    title: "Keep Code Comments<br><span class=\"hero-gradient-text\">Inside the Editor</span>"
    subtitle: "Attach durable comments, tags and bookmarks to code without modifying source files. Write docs in Markdown, link to code with <code>@tags</code>, generate relation graphs.<br>One-stop support for Mermaid diagrams, LaTeX formulas, syntax highlighting, and HTML export."
